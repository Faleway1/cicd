# Pipeline CI/CD DevSecOps (POC) pour Angular + Spring Boot + Docker.
#
# Fonctionnalités couvertes :
# - Lint + analyse statique (ESLint front, SpotBugs back)
# - Tests unitaires (Karma + JUnit) + couverture
# - Build des 3 images Docker (front, back, all-in-one)
# - Scan de sécurité Trivy avec blocage sur CVE critiques
# - Push vers le registry GitLab privé
# - Déploiement staging via docker compose (optionnel, manuel)

stages:
  - lint
  - test
  - quality
  - package
  - deploy

variables:
  # Docker-in-Docker pour build/push/scan d'images
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2

  # Build plus rapide et reproductible
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"

  # Tag sémantique : on privilégie le tag Git, sinon SHA court
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .gradle/wrapper
    - .gradle/caches
    - .npm/
    - front/node_modules/

# ----------- LINT / ANALYSE STATIQUE -----------

lint:frontend:
  stage: lint
  image: node:20
  before_script:
    - cd front
    - npm install
  script:
    - npm run lint

spotbugs:backend:
  stage: lint
  image: gradle:8.7-jdk17
  before_script:
    - cd back
    - chmod +x gradlew
  script:
    - ./gradlew spotbugsMain spotbugsTest
  artifacts:
    when: always
    paths:
      - back/build/reports/spotbugs/

# ----------- TESTS + COUVERTURE -----------

test:frontend:
  stage: test
  image: cypress/browsers:node-20.13.1-chrome-125.0.6422.141-1-ff-126.0.1-edge-125.0.2535.51-1
  before_script:
    - cd front
    - npm install
  script:
    - CHROME_BIN=/usr/bin/google-chrome npm run test:ci
  artifacts:
    when: always
    paths:
      - front/coverage/
      - front/test-results/

test:backend:
  stage: test
  image: gradle:8.7-jdk17
  before_script:
    - cd back
    - chmod +x gradlew
  script:
    - ./gradlew test jacocoTestReport
  artifacts:
    when: always
    reports:
      junit: back/build/test-results/test/*.xml
    paths:
      - back/build/reports/tests/test/
      - back/build/reports/jacoco/test/
      - back/build/jacoco/

# ----------- BUILD + SCAN + PUSH DOCKER -----------

.build_scan_push_template:
  stage: package
  image: docker:27
  services:
    - name: docker:27-dind
      command: ["--tls=false"]
  before_script:
    # Si le pipeline est lancé sur un tag Git, on prend ce tag comme version d'image
    - if [ -n "$CI_COMMIT_TAG" ]; then export IMAGE_TAG="$CI_COMMIT_TAG"; fi
    - echo "IMAGE_TAG=$IMAGE_TAG"
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    # Installation Trivy en binaire pour scanner l'image locale avant push
    - apk add --no-cache curl tar
    - TRIVY_VERSION="0.52.2"
    - curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" -o trivy.tar.gz
    - tar -xzf trivy.tar.gz trivy
    - install -m 755 trivy /usr/local/bin/trivy
  script:
    - export IMAGE_NAME="$CI_REGISTRY_IMAGE/$IMAGE_COMPONENT"
    - export IMAGE_REF="$IMAGE_NAME:$IMAGE_TAG"
    - echo "Build target=$DOCKER_TARGET -> $IMAGE_REF"
    - docker build --target "$DOCKER_TARGET" -t "$IMAGE_REF" .
    # Échec du job si vulnérabilités CRITICAL trouvées
    - trivy image --no-progress --severity CRITICAL --exit-code 1 "$IMAGE_REF"
    - docker push "$IMAGE_REF"
    # Tag additionnel latest sur la branche par défaut (pratique pour staging)
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        docker tag "$IMAGE_REF" "$IMAGE_NAME:latest"
        docker push "$IMAGE_NAME:latest"
      fi

package:image_frontend:
  extends: .build_scan_push_template
  variables:
    IMAGE_COMPONENT: frontend
    DOCKER_TARGET: front

package:image_backend:
  extends: .build_scan_push_template
  variables:
    IMAGE_COMPONENT: backend
    DOCKER_TARGET: back

package:image_all_in_one:
  extends: .build_scan_push_template
  variables:
    IMAGE_COMPONENT: all-in-one
    DOCKER_TARGET: standalone

# ----------- DEPLOIEMENT STAGING (OPTIONNEL) -----------

deploy:staging:
  stage: deploy
  image: docker:27
  services:
    - name: docker:27-dind
      command: ["--tls=false"]
  when: manual
  allow_failure: false
  before_script:
    - if [ -n "$CI_COMMIT_TAG" ]; then export IMAGE_TAG="$CI_COMMIT_TAG"; fi
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    - apk add --no-cache docker-cli-compose
  script:
    # Le déploiement est prévu pour un runner ayant accès à l'hôte de staging
    # et à des variables protégées (ex: STAGING_HOST, SSH_KEY) si nécessaire.
    - export FRONTEND_IMAGE="$CI_REGISTRY_IMAGE/frontend:$IMAGE_TAG"
    - export BACKEND_IMAGE="$CI_REGISTRY_IMAGE/backend:$IMAGE_TAG"
    - export ALL_IN_ONE_IMAGE="$CI_REGISTRY_IMAGE/all-in-one:$IMAGE_TAG"
    - docker compose -f docker-compose.yml pull
    - docker compose -f docker-compose.yml up -d
  environment:
    name: staging
